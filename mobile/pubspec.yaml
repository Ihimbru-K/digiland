name: landvault
description: Informal Land Documentation & Verification Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0

  # HTTP
  dio: ^5.4.3

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Camera & Images
  image_picker: ^1.1.2
  camera: ^0.11.0

  # Storage
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Signature
  signature: ^5.4.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
